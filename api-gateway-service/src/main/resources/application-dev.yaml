server:
  port: 8001

spring:
  application:
    name: api-gateway-service

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/restful/v1/api/user/**

